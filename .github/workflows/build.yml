name: Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK (.lnrp)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GPR_USER: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GPR_TOKEN }}
        run: ./gradlew :plugin:assembleRelease --stacktrace

      - name: Collect .lnrp output
        run: |
          mkdir -p plugin/build/outputs/lnrp
          find plugin/build/outputs/apk/release -name "*.lnrp" -exec cp {} plugin/build/outputs/lnrp/ \;
          find plugin/build/outputs/apk/release -name "*.apk" | while read f; do
            base=$(basename "$f" .apk)
            dest="plugin/build/outputs/lnrp/${base}.lnrp"
            if [ ! -f "$dest" ]; then cp "$f" "$dest"; fi
          done
          ls -la plugin/build/outputs/lnrp/

      - name: Find .lnrp output
        id: find_lnrp
        run: |
          LNRP=$(find plugin/build/outputs/lnrp -name "*.lnrp" | head -1)
          echo "lnrp_path=$LNRP" >> $GITHUB_OUTPUT
          echo "Found: $LNRP"

      - name: Upload artifact (every build)
        uses: actions/upload-artifact@v4
        with:
          name: huanmeng-plugin-lnrp
          path: plugin/build/outputs/lnrp/*.lnrp
          if-no-files-found: error

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' plugin/build.gradle.kts | grep -oP '(?<=versionName = ")[^"]+' || echo "1.0.0")
          TIMESTAMP=$(date +%Y%m%d%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Huanmeng LNR Plugin ${{ steps.version.outputs.version }}"
          body: |
            ## Huanmeng LNR Plugin

            Auto-built `.lnrp` plugin for LightNovelReader.

            - Search, book details, volume-based TOC, text+image content, explore pages
            - Commit: ${{ github.sha }}
            - Time: ${{ github.event.head_commit.timestamp }}
          files: plugin/build/outputs/lnrp/*.lnrp
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
